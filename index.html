
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Income-tax Interest Calculator</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0;padding:20px;color:#102027}
.wrap{max-width:1100px;margin:auto}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
input,select{width:100%;padding:8px;border-radius:6px;border:1px solid #ddd}
button{background:#0ea5a4;color:white;border:0;padding:8px 12px;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid #eee;padding:8px;font-size:13px;text-align:left}
.actions{display:flex;gap:8px;margin-top:10px}
.out{background:#f8fafb;border-radius:8px;padding:12px}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h2>Income-tax Interest Calculator (Sections 234A / 234B / 234C / 234F)</h2>
</div>

<form id="frm">

<div class="card grid">
<div>
<label>Total Tax Payable</label>
<input id="taxPayable" type="number">
</div>

<div>
<label>TDS / TCS</label>
<input id="tds" type="number">
</div>

<div>
<label>Relief / MAT Credit</label>
<input id="relief" type="number">
</div>
</div>

<div class="card grid">
<div>
<label>Self Assessment Tax</label>
<input id="selfTax" type="number">
</div>

<div>
<label>Total Income</label>
<input id="totalIncome" type="number">
</div>

<div>
<label>Assessment Year</label>
<select id="ay">
<option>2024-25</option>
<option>2025-26</option>
<option>2026-27</option>
</select>
</div>
</div>

<div class="card grid2">
<div>
<label>Return Due Date</label>
<input id="dueReturn" type="date">
</div>

<div>
<label>Actual Filing Date</label>
<input id="fileReturn" type="date">
</div>
</div>

<div class="card">
<h3>Advance Tax Payments</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="paymentsBody">
<tr><td colspan="3">No payments entered</td></tr>
</tbody>
</table>

<div class="actions">
<button type="button" id="addPayment">Add Payment</button>
<button type="button" id="clearPayments">Clear</button>
</div>
</div>

<div class="card actions">
<button type="button" id="compute">Compute Interest</button>
<button type="button" id="reset">Reset</button>
</div>

</form>

<div id="output" class="card out"></div>

</div>

<script>

const $ = id => document.getElementById(id);

function num(v){return Number(v)||0}

function fmt(v){
return "₹ "+Number(v).toLocaleString("en-IN",{minimumFractionDigits:2})
}

function days(a,b){
return Math.ceil((new Date(b)-new Date(a))/(1000*60*60*24))
}

function months(a,b){
let d=days(a,b)
if(d<=0) return 0
return Math.ceil(d/30)
}

function round100(x){
return Math.round(x/100)*100
}

let payments=[]

function renderPayments(){

let body=$("paymentsBody")
body.innerHTML=""

if(payments.length==0){

body.innerHTML='<tr><td colspan="3">No payments entered</td></tr>'
return
}

payments.forEach((p,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=
`<td>${p.date}</td>
<td>${p.amount}</td>
<td><button onclick="removePayment(${i})">Remove</button></td>`

body.appendChild(tr)

})
}

function removePayment(i){
payments.splice(i,1)
renderPayments()
}

$("addPayment").onclick=()=>{

let date=prompt("Payment date YYYY-MM-DD")
if(!date) return

let amt=Number(prompt("Amount"))
if(!amt) return

payments.push({date:date,amount:amt})

payments.sort((a,b)=>new Date(a.date)-new Date(b.date))

renderPayments()

}

$("clearPayments").onclick=()=>{
payments=[]
renderPayments()
}

$("reset").onclick=()=>{
document.getElementById("frm").reset()
payments=[]
renderPayments()
$("output").innerHTML=""
}

function paidTill(date){

let total=0

payments.forEach(p=>{
if(new Date(p.date)<=new Date(date))
total+=Number(p.amount)
})

return total
}

$("compute").onclick=()=>{

let tax=num($("taxPayable").value)
let tds=num($("tds").value)
let relief=num($("relief").value)
let selfTax=num($("selfTax").value)

let totalIncome=num($("totalIncome").value)

let due=$("dueReturn").value
let file=$("fileReturn").value

let ay=$("ay").value

let assessed=tax-tds-relief
if(assessed<0) assessed=0

let totalAdvance=payments.reduce((a,b)=>a+Number(b.amount),0)

let paidFile=paidTill(file)

let shortA=Math.max(assessed-(selfTax+paidFile),0)

let monthsA=months(due,file)

let intA=shortA*0.01*monthsA

let ayYear=parseInt(ay.split("-")[0])

let ayStart=`${ayYear}-04-01`

let baseB=Math.max(assessed-totalAdvance,0)

let baseBR=round100(baseB)

let monthsB=months(ayStart,file)

let intB=baseBR*0.01*monthsB

let due1=`${ayYear}-06-15`
let due2=`${ayYear}-09-15`
let due3=`${ayYear}-12-15`
let due4=`${ayYear+1}-03-15`

let req1=assessed*0.15
let req2=assessed*0.45
let req3=assessed*0.75
let req4=assessed

let short1=Math.max(req1-paidTill(due1),0)
let short2=Math.max(req2-paidTill(due2),0)
let short3=Math.max(req3-paidTill(due3),0)
let short4=Math.max(req4-paidTill(due4),0)

let int1=short1*0.01*3
let int2=short2*0.01*3
let int3=short3*0.01*3
let int4=short4*0.01*1

let intC=int1+int2+int3+int4

let feeF=0

if(new Date(file)>new Date(due)){

if(totalIncome<=500000) feeF=1000
else feeF=5000

}

let totalInt=intA+intB+intC

$("output").innerHTML=`

<h3>Summary</h3>

<table>

<tr><th>Assessed Tax</th><td>${fmt(assessed)}</td></tr>

<tr><th>234A Interest</th><td>${fmt(intA)}</td></tr>

<tr><th>234B Interest</th><td>${fmt(intB)}</td></tr>

<tr><th>234C Interest</th><td>${fmt(intC)}</td></tr>

<tr><th>Late Fee 234F</th><td>${fmt(feeF)}</td></tr>

<tr><th>Total Payable</th><td>${fmt(totalInt+feeF)}</td></tr>

</table>

`

}

renderPayments()

</script>

</body>
</html>
