<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Income Tax Interest Calculator</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:20px; border-radius:8px; max-width:800px; margin:auto; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
input, select, button { padding:8px; margin:6px 0; width:100%; }
button { cursor:pointer; }
.primary { background:#2563eb; color:white; border:none; }
.danger { background:#ef4444; color:white; border:none; }
table { width:100%; border-collapse:collapse; margin-top:10px;}
th, td { border:1px solid #ddd; padding:6px; text-align:center; }
.result { background:#f0f9ff; padding:10px; margin-top:15px; border-radius:6px;}
</style>
</head>
<body>

<div class="card">

<h2>Income Tax Interest Calculator</h2>

<label>Assessment Year</label>
<input type="text" id="ay" placeholder="2024-25">

<label>Assessed Tax</label>
<input type="number" id="assessedTax">

<label>Return Filing Date</label>
<input type="date" id="filingDate">

<hr>

<h3>Advance Tax Payments</h3>

<button type="button" class="primary" id="addPayment">Add Payment</button>
<button type="button" class="danger" id="clearPayments">Clear All</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="paymentsBody">
<tr><td colspan="3">No payments entered</td></tr>
</tbody>
</table>

<hr>

<button type="button" class="primary" id="compute">Compute Interest</button>

<div id="result" class="result"></div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

const $ = (id)=>document.getElementById(id);

function toNum(v){ return isNaN(Number(v))?0:Number(v); }
function round100(x){ return Math.round(x/100)*100; }

function monthsBetween(a,b){
  const A=new Date(a);
  const B=new Date(b);
  if(isNaN(A)||isNaN(B)||B<=A) return 0;
  return Math.ceil((B-A)/(1000*60*60*24*30));
}

let payments=[];

function renderPayments(){
  const body=$('paymentsBody');
  body.innerHTML='';
  if(payments.length===0){
    body.innerHTML='<tr><td colspan="3">No payments entered</td></tr>';
    return;
  }
  payments.forEach((p,i)=>{
    body.innerHTML+=`
      <tr>
        <td>${p.date}</td>
        <td>${p.amount.toFixed(2)}</td>
        <td><button type="button" data-i="${i}" class="removeBtn">Remove</button></td>
      </tr>`;
  });

  document.querySelectorAll('.removeBtn').forEach(btn=>{
    btn.onclick=function(){
      payments.splice(this.dataset.i,1);
      renderPayments();
    }
  });
}

$('addPayment').onclick=function(){
  const d=prompt("Payment Date (YYYY-MM-DD)");
  if(!d) return;
  const a=prompt("Amount");
  if(!a) return;
  payments.push({date:d,amount:toNum(a)});
  renderPayments();
}

$('clearPayments').onclick=function(){
  payments=[];
  renderPayments();
}

$('compute').onclick=function(){

  const assessed=toNum($('assessedTax').value);
  const filing=$('filingDate').value;
  const ay=$('ay').value;

  if(!assessed||!filing||!ay){
    alert("Fill all fields");
    return;
  }

  const totalAdvance=payments.reduce((s,p)=>s+p.amount,0);

  // 234B
  let base234B=Math.max(assessed-totalAdvance,0);
  if(totalAdvance>=0.9*assessed) base234B=0;
  base234B=round100(base234B);

  const ayStartYear=parseInt(ay.split('-')[0]);
  const startDate=ayStartYear+"-04-01";
  const months234B=monthsBetween(startDate,filing);
  const int234B=base234B*0.01*months234B;

  // Simple 234A
  const dueDate=ayStartYear+"-07-31";
  const months234A=monthsBetween(dueDate,filing);
  const int234A=assessed*0.01*months234A;

  const totalInterest=int234A+int234B;

  $('result').innerHTML=`
    <b>Total Advance Paid:</b> ₹ ${totalAdvance.toFixed(2)}<br>
    <b>234A Interest:</b> ₹ ${int234A.toFixed(2)}<br>
    <b>234B Interest:</b> ₹ ${int234B.toFixed(2)}<br>
    <b>Total Interest:</b> ₹ ${totalInterest.toFixed(2)}
  `;
}

renderPayments();

});
</script>

</body>
</html>
